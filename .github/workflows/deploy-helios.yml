name: Deploy Helios SMS

on:
  push:
    branches:
      - master
    paths:
      - "Simple Projects V1/Helios_SMS_FV1/frontend/**"
      - ".github/workflows/deploy-helios.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: helios-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "Simple Projects V1/Helios_SMS_FV1/frontend"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "Simple Projects V1/Helios_SMS_FV1/frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Simple Projects V1/Helios_SMS_FV1/frontend/dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
